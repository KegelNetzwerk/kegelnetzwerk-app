sonar.projectKey=KegelNetzwerk_kegelnetzwerk-app
sonar.organization=kegelnetzwerk

sonar.javascript.lcov.reportPaths=coverage/lcov.info
sonar.sources=src,app
sonar.exclusions=**/node_modules/**,**/.expo/**,**/android/**,**/ios/**

# Exclude test files from duplication detection
sonar.cpd.exclusions=src/__tests__/**

# Only src/utils/ contains pure, unit-testable logic.
# All other src/ directories (hooks, components, storage, api, notifications)
# and all app/ screens require React Native / Expo runtime — not unit-testable.
sonar.coverage.exclusions=\
  app/**,\
  src/api/**,\
  src/components/**,\
  src/hooks/**,\
  src/notifications/**,\
  src/storage/**,\
  src/i18n/**,\
  src/models/**,\
  src/web-stubs/**
